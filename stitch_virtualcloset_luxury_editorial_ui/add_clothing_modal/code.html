<script>
        // Simple state management to demonstrate the flow
        const sections = {
            choose: document.getElementById('step-choose'),
            camera: document.getElementById('step-camera'),
            processing: document.getElementById('step-processing'),
            details: document.getElementById('step-details')
        };
        const header = document.getElementById('flow-header');

        function hideAll() {
            Object.values(sections).forEach(el => {
                el.classList.add('opacity-0', 'pointer-events-none');
                el.classList.remove('z-30');
            });
        }

        function goToStep(step) {
            hideAll();
            
            // Manage Header visibility
            if (step === 'camera') {
                header.classList.add('opacity-0', 'pointer-events-none');
            } else {
                header.classList.remove('opacity-0', 'pointer-events-none');
            }

            const target = sections[step];
            if (target) {
                target.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-8');
                target.classList.add('z-30');
            }
        }

        function startProcessing() {
            goToStep('processing');
            
            // Simulate processing time, then go to details
            setTimeout(() => {
                goToStep('details');
            }, 2500);
        }

        function simulateUpload() {
            goToStep('processing');
            setTimeout(() => {
                goToStep('details');
            }, 1500);
        }

        function resetFlow() {
            // Reset to initial state
            goToStep('choose');
            // Reset transforms for re-entry animations
            sections.details.classList.add('translate-y-8');
        }

        // Initialize
        goToStep('choose');
    </script>
