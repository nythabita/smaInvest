</label>

                    Lihat Pembahasan
                </button>
<button class="w-full py-4 rounded-full bg-primary text-on-primary font-button-text text-button-text text-center active:scale-[0.98] transition-transform shadow-[0px_4px_12px_rgba(0,96,56,0.2)] hover:bg-surface-tint" id="back-dashboard-btn">
                    Kembali ke Dashboard
                </button>

<!-- Simple Script to toggle between Quiz and Result views for demonstration -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const submitBtn = document.getElementById('submit-btn');
            const backBtn = document.getElementById('back-dashboard-btn');
            const quizView = document.getElementById('quiz-view');
            const resultView = document.getElementById('result-view');

            submitBtn.addEventListener('click', () => {
                // Hide Quiz
                quizView.classList.remove('opacity-100');
                quizView.classList.add('opacity-0', 'pointer-events-none');
                
                // Show Result after small delay
                setTimeout(() => {
                    resultView.classList.remove('opacity-0', 'pointer-events-none');
                    resultView.classList.add('opacity-100');
                }, 150);
            });

            backBtn.addEventListener('click', () => {
                // Reset for demo purposes
                resultView.classList.remove('opacity-100');
                resultView.classList.add('opacity-0', 'pointer-events-none');
                
                setTimeout(() => {
                    quizView.classList.remove('opacity-0', 'pointer-events-none');
                    quizView.classList.add('opacity-100');
                }, 150);
            });
        });
    </script>
